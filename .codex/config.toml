# Project-scoped Codex defaults.
# Loaded only when the project is trusted.

sandbox_mode = "workspace-write"
approval_policy = "on-request"
project_doc_fallback_filenames = ["AGENTS.md"]
project_doc_max_bytes = 65536

[agents.reviewer]
description = "Review-focused Codex role"
config = ".codex/roles/reviewer.toml"

[agents.github_issue_manager]
description = "GitHub issue management role"
config = ".codex/roles/github-issue-manager.toml"

[agents.planner]
description = "Architectural planning role"
config = ".codex/roles/planner.toml"

[agents.implementer]
description = "Feature implementation and refactoring role"
config = ".codex/roles/implementer.toml"