name: ai-config-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate Copilot files
        run: node scripts/validate-copilot-files.mjs

      - name: Validate Codex files
        run: node scripts/validate-codex-files.mjs
